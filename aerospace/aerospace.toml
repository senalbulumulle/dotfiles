# aerospace.toml
# AeroSpace tiling window manager config
# Lives at ~/.config/aerospace/aerospace.toml
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# Start AeroSpace automatically at login
start-at-login = true

# Notify sketchybar when the focused workspace changes so the bar
# can show workspace indicators (needs a matching item in sketchybarrc
# that subscribes to the aerospace_workspace_change event)
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Normalizations keep the window tree simple and predictable
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Padding around the non-focused windows in accordion (tabbed) layout
accordion-padding = 30

# Start new workspaces in tiling layout; alt-comma switches to accordion
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Move the mouse to the focused monitor when focus changes monitor
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

[mode.main.binding]
# Layouts
# alt-slash: cycle tiled layouts, alt-comma: accordion ("windows as tabs")
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus windows (vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize windows
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move focused window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Jump between the two most recent workspaces
alt-tab = 'workspace-back-and-forth'
# Move the whole workspace to the next monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter service mode for less common operations
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
# Reset the layout of the current workspace
r = ['flatten-workspace-tree', 'mode main']
# Toggle floating / tiling for the focused window
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Join the focused window with a neighbour into one group
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
